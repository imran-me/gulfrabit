  <main id="main" class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card__inner">
        <div class="auth-head">
          <img class="auth-head__logo" src="/assets/logo/gulfrabit-logo.png" alt="GulfRabit">
          <h1 class="h4">Create your account</h1>
          <p class="caption">Sourced. Verified. Delivered — to your door.</p>
        </div>
        <form data-auth-form data-auth-mode="register" novalidate>
          <div class="field-gr" data-field>
            <label class="label-gr" for="name">Full name</label>
            <input id="name" class="input-gr" name="name" data-validate="required|min:3" data-label="Full name" autocomplete="name">
            <span class="field-error" data-error></span>
          </div>
          <div class="field-gr" data-field>
            <label class="label-gr" for="email">Email</label>
            <input id="email" class="input-gr" type="email" name="email" data-validate="required|email" data-label="Email" autocomplete="email">
            <span class="field-error" data-error></span>
          </div>
          <div class="field-gr" data-field>
            <label class="label-gr" for="phone">Phone</label>
            <input id="phone" class="input-gr" name="phone" data-validate="required|phone" data-label="Phone" placeholder="01XXXXXXXXX" autocomplete="tel">
            <span class="field-error" data-error></span>
          </div>
          <div class="field-gr" data-field>
            <label class="label-gr" for="password">Password</label>
            <div class="pw-toggle">
              <input id="password" class="input-gr" type="password" name="password" data-validate="required|min:6" data-label="Password" autocomplete="new-password">
              <button class="pw-toggle__btn" type="button" data-toggle-pw aria-label="Show password">👁</button>
            </div>
            <span class="field-error" data-error></span>
          </div>
          <div class="field-gr" data-field>
            <label class="label-gr" for="confirm">Confirm password</label>
            <input id="confirm" class="input-gr" type="password" name="confirm" data-validate="required|match:#password" data-label="Confirmation" autocomplete="new-password">
            <span class="field-error" data-error></span>
          </div>
          <label class="check-gr" style="margin-bottom:var(--space-4)"><input type="checkbox" name="terms" data-validate="required" data-label="Terms"> I agree to the Terms &amp; Privacy Policy</label>
          <button class="btn-gr btn-primary-gr btn-block-gr btn-lg-gr" type="submit">Create Account</button>
        </form>
        <p class="auth-alt">Already have an account? <a href="/modules/auth/login.html">Sign in</a></p>
      </div>
    </div>
  </main>
