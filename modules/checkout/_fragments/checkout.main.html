  <main id="main" class="gr-container" style="padding-block:var(--space-6) var(--space-9)">
    <nav class="breadcrumb-gr" aria-label="Breadcrumb" style="margin-bottom:var(--space-5)">
      <a href="/index.html">Home</a><span class="breadcrumb-gr__sep">/</span>
      <a href="/modules/cart/cart.html">Cart</a><span class="breadcrumb-gr__sep">/</span><span>Checkout</span>
    </nav>
    <h1 class="h2" style="margin-bottom:var(--space-6)">Checkout</h1>

    <!-- Progress stepper -->
    <div class="stepper" data-stepper aria-label="Checkout progress">
      <div class="step is-active" data-step-indicator="1"><span class="step__num">1</span> Address</div>
      <span class="step__line"></span>
      <div class="step" data-step-indicator="2"><span class="step__num">2</span> Delivery</div>
      <span class="step__line"></span>
      <div class="step" data-step-indicator="3"><span class="step__num">3</span> Payment</div>
      <span class="step__line"></span>
      <div class="step" data-step-indicator="4"><span class="step__num">4</span> Review</div>
    </div>

    <div class="checkout-layout">
      <form data-checkout-form novalidate>
        <!-- STEP 1 · Address -->
        <section class="checkout-step" data-step="1">
          <h2 class="h4 checkout-step__title">Delivery Address</h2>
          <div class="form-grid">
            <div class="field-gr" data-field><label class="label-gr" for="fullName">Full name <span class="req">*</span></label><input id="fullName" class="input-gr" name="fullName" data-validate="required|min:3" data-label="Full name"><span class="field-error" data-error></span></div>
            <div class="field-gr" data-field><label class="label-gr" for="phone">Phone <span class="req">*</span></label><input id="phone" class="input-gr" name="phone" data-validate="required|phone" data-label="Phone" placeholder="01XXXXXXXXX"><span class="field-error" data-error></span></div>
            <div class="field-gr col-span-2" data-field><label class="label-gr" for="address">Address <span class="req">*</span></label><input id="address" class="input-gr" name="address" data-validate="required|min:6" data-label="Address"><span class="field-error" data-error></span></div>
            <div class="field-gr" data-field><label class="label-gr" for="city">City <span class="req">*</span></label><input id="city" class="input-gr" name="city" data-validate="required" data-label="City" value="Dhaka"><span class="field-error" data-error></span></div>
            <div class="field-gr" data-field><label class="label-gr" for="postcode">Postcode</label><input id="postcode" class="input-gr" name="postcode" data-validate="numeric" data-label="Postcode"><span class="field-error" data-error></span></div>
            <div class="field-gr col-span-2" data-field><label class="label-gr" for="notes">Delivery notes (optional)</label><textarea id="notes" class="textarea-gr" name="notes" style="min-height:80px"></textarea></div>
          </div>
          <div class="step-nav"><a class="btn-gr btn-ghost-gr" href="/modules/cart/cart.html">← Back to cart</a><button class="btn-gr btn-primary-gr" type="button" data-next>Continue to Delivery</button></div>
        </section>

        <!-- STEP 2 · Delivery -->
        <section class="checkout-step" data-step="2" hidden>
          <h2 class="h4 checkout-step__title">Delivery Method</h2>
          <label class="option-card is-selected"><input type="radio" name="delivery" value="standard" data-delivery data-cost="60" checked><span><span class="option-card__title">Standard</span><span class="option-card__sub">2–5 business days · nationwide</span></span><span class="option-card__price" data-free-note>৳ 60</span></label>
          <label class="option-card"><input type="radio" name="delivery" value="express" data-delivery data-cost="150"><span><span class="option-card__title">Express (Dhaka)</span><span class="option-card__sub">Next-day within Dhaka</span></span><span class="option-card__price">৳ 150</span></label>
          <label class="option-card"><input type="radio" name="delivery" value="coldchain" data-delivery data-cost="200"><span><span class="option-card__title">Cold-chain</span><span class="option-card__sub">Temperature-controlled for perishables</span></span><span class="option-card__price">৳ 200</span></label>
          <div class="step-nav"><button class="btn-gr btn-ghost-gr" type="button" data-prev>← Back</button><button class="btn-gr btn-primary-gr" type="button" data-next>Continue to Payment</button></div>
        </section>

        <!-- STEP 3 · Payment -->
        <section class="checkout-step" data-step="3" hidden>
          <h2 class="h4 checkout-step__title">Payment</h2>
          <p class="caption" style="margin-bottom:var(--space-4)">This is a demo checkout — no real payment is processed.</p>
          <label class="option-card is-selected"><input type="radio" name="payment" value="bkash" data-payment checked><span><span class="option-card__title">bKash</span><span class="option-card__sub">Mobile financial service</span></span></label>
          <label class="option-card"><input type="radio" name="payment" value="nagad" data-payment><span><span class="option-card__title">Nagad</span><span class="option-card__sub">Mobile financial service</span></span></label>
          <label class="option-card"><input type="radio" name="payment" value="card" data-payment><span><span class="option-card__title">Card</span><span class="option-card__sub">Visa / Mastercard</span></span></label>
          <label class="option-card"><input type="radio" name="payment" value="cod" data-payment><span><span class="option-card__title">Cash on Delivery</span><span class="option-card__sub">Pay when it arrives</span></span></label>

          <!-- Card fields (shown only when Card selected) -->
          <div data-card-fields hidden style="margin-top:var(--space-4)">
            <div class="form-grid">
              <div class="field-gr col-span-2" data-field><label class="label-gr" for="cardNum">Card number</label><input id="cardNum" class="input-gr" name="cardNum" inputmode="numeric" placeholder="4242 4242 4242 4242" data-validate="numeric" data-label="Card number"><span class="field-error" data-error></span></div>
              <div class="field-gr" data-field><label class="label-gr" for="cardExp">Expiry</label><input id="cardExp" class="input-gr" name="cardExp" placeholder="MM/YY"><span class="field-error" data-error></span></div>
              <div class="field-gr" data-field><label class="label-gr" for="cardCvc">CVC</label><input id="cardCvc" class="input-gr" name="cardCvc" inputmode="numeric" placeholder="123"><span class="field-error" data-error></span></div>
            </div>
          </div>
          <!-- TODO: connect to payment gateway -->
          <div class="step-nav"><button class="btn-gr btn-ghost-gr" type="button" data-prev>← Back</button><button class="btn-gr btn-primary-gr" type="button" data-next>Review Order</button></div>
        </section>

        <!-- STEP 4 · Review -->
        <section class="checkout-step" data-step="4" hidden>
          <h2 class="h4 checkout-step__title">Review &amp; Place Order</h2>
          <div class="surface-gr" style="padding:var(--space-5);margin-bottom:var(--space-4)">
            <div class="review-line"><span class="text-muted-gr">Ship to</span><span data-review-address>—</span></div>
            <div class="review-line"><span class="text-muted-gr">Delivery</span><span data-review-delivery>—</span></div>
            <div class="review-line"><span class="text-muted-gr">Payment</span><span data-review-payment>—</span></div>
          </div>
          <div class="surface-gr" style="padding:var(--space-5)" data-review-items></div>
          <div class="step-nav"><button class="btn-gr btn-ghost-gr" type="button" data-prev>← Back</button><button class="btn-gr btn-gradient-gr btn-lg-gr" type="submit" data-place-order>Place Order</button></div>
        </section>
      </form>

      <!-- Sticky order summary -->
      <aside class="surface-gr order-summary" style="padding:var(--space-5)">
        <h2 class="h5" style="margin-bottom:var(--space-4)">Order Summary</h2>
        <div data-summary-items style="max-height:280px;overflow:auto;margin-bottom:var(--space-4)"></div>
        <div class="summary-row"><span>Subtotal</span><span class="tabular" data-sum-subtotal>৳ 0</span></div>
        <div class="summary-row"><span>Delivery</span><span class="tabular" data-sum-delivery>৳ 60</span></div>
        <div class="summary-row summary-row--total"><span>Total</span><span class="tabular" data-sum-total>৳ 0</span></div>
      </aside>
    </div>
  </main>
