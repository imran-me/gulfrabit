  <main id="main" class="gr-container" style="padding-block:var(--space-6) var(--space-9)">
    <header style="margin-bottom:var(--space-7);max-width:56ch">
      <p class="overline">Contact</p>
      <h1 class="h2">We’re here to help.</h1>
      <p class="text-muted-gr">Questions about an order, a product, or bulk sourcing? Reach out — we usually reply within a few hours.</p>
    </header>

    <div class="contact-grid">
      <!-- Form -->
      <form class="surface-gr" data-contact-form novalidate style="padding:var(--space-6)">
        <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:0 var(--space-4)">
          <div class="field-gr" data-field><label class="label-gr" for="c-name">Name <span class="req">*</span></label><input id="c-name" class="input-gr" name="name" data-validate="required|min:2" data-label="Name"><span class="field-error" data-error></span></div>
          <div class="field-gr" data-field><label class="label-gr" for="c-email">Email <span class="req">*</span></label><input id="c-email" class="input-gr" type="email" name="email" data-validate="required|email" data-label="Email"><span class="field-error" data-error></span></div>
        </div>
        <div class="field-gr" data-field><label class="label-gr" for="c-subject">Subject</label>
          <select id="c-subject" class="select-gr" name="subject"><option>Order enquiry</option><option>Product question</option><option>Bulk / B2B sourcing</option><option>Feedback</option><option>Other</option></select>
        </div>
        <div class="field-gr" data-field><label class="label-gr" for="c-message">Message <span class="req">*</span></label><textarea id="c-message" class="textarea-gr" name="message" data-validate="required|min:10" data-label="Message"></textarea><span class="field-error" data-error></span></div>
        <button class="btn-gr btn-primary-gr btn-lg-gr" type="submit">Send message</button>
      </form>

      <!-- Channels + map -->
      <aside>
        <div class="surface-gr" style="padding:var(--space-5);margin-bottom:var(--space-4)">
          <div class="contact-channel"><span class="contact-channel__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg></span><div><strong>Email</strong><br><a href="mailto:hello@gulfrabit.com">hello@gulfrabit.com</a></div></div>
          <div class="contact-channel"><span class="contact-channel__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7A2 2 0 0 1 22 16.9z"/></svg></span><div><strong>Phone / WhatsApp</strong><br><a href="tel:+8801700000000">+880 1700 000000</a></div></div>
          <div class="contact-channel" style="border-bottom:0"><span class="contact-channel__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><path d="M12 21s7-5.5 7-11a7 7 0 0 0-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span><div><strong>Studio</strong><br>Gulshan Avenue, Dhaka 1212</div></div>
        </div>
        <div class="map-placeholder">Map placeholder · Gulshan, Dhaka</div>
      </aside>
    </div>
  </main>
