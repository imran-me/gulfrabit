<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" role="img" aria-label="Full-Grain Leather Weekender">
  <defs>
    <linearGradient id="accent" gradientTransform="rotate(72 .5 .5)"><stop offset="0" stop-color="#8A8F8C"/><stop offset="1" stop-color="#1BB4D4"/></linearGradient>
    <radialGradient id="glow" cx="54%" cy="33%" r="75%"><stop offset="0" stop-color="#8A8F8C" stop-opacity=".22"/><stop offset="60%" stop-color="#8A8F8C" stop-opacity="0"/></radialGradient>
    <radialGradient id="vig" cx="50%" cy="44%" r="75%"><stop offset="55%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".42"/></radialGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity=".05"/></pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".45"/></filter>
  </defs>
  <rect width="400" height="500" fill="#141414"/>
  <rect width="400" height="500" fill="url(#dots)"/>
  <rect width="400" height="500" fill="url(#glow)"/>
  <g filter="url(#soft)" transform="translate(200 232) scale(1.0) translate(-200 -232)"><path fill="url(#accent)" stroke="rgba(255,255,255,.18)" stroke-width="1.5" d="M136 202 l60 -46 l86 0 l0 86 l-46 60 z"/>
        <circle stroke="rgba(255,255,255,.16)" fill="none" stroke-width="1.2" cx="240" cy="200" r="10"/>
        <path stroke="rgba(255,255,255,.16)" fill="none" stroke-width="1.2" d="M160 272 l70 -70"/></g>
  <rect width="400" height="500" fill="url(#vig)"/>
  <text x="28" y="46" font-family="Inter, sans-serif" font-size="12" letter-spacing="2.5" fill="#8A8F8C">ATLAS</text>
  <text x="28" y="452" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#F7F8F7">Full-Grain Leather Weekender</text>
  <text x="28" y="476" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#8A8F8C">GULFRABIT</text>
</svg>
