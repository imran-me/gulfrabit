<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" role="img" aria-label="True Wireless Earbuds Pro">
  <defs>
    <linearGradient id="accent" gradientTransform="rotate(116 .5 .5)"><stop offset="0" stop-color="#1BB4D4"/><stop offset="1" stop-color="#4a4a4a"/></linearGradient>
    <radialGradient id="glow" cx="57%" cy="32%" r="75%"><stop offset="0" stop-color="#1BB4D4" stop-opacity=".22"/><stop offset="60%" stop-color="#1BB4D4" stop-opacity="0"/></radialGradient>
    <radialGradient id="vig" cx="50%" cy="44%" r="75%"><stop offset="55%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".42"/></radialGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity=".05"/></pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".45"/></filter>
  </defs>
  <rect width="400" height="500" fill="#141414"/>
  <rect width="400" height="500" fill="url(#dots)"/>
  <rect width="400" height="500" fill="url(#glow)"/>
  <g filter="url(#soft)" transform="translate(200 220) scale(0.82) translate(-200 -232)"><rect fill="url(#accent)" stroke="rgba(255,255,255,.18)" stroke-width="1.5" x="140" y="154" rx="16" width="120" height="156"/>
        <rect stroke="rgba(255,255,255,.16)" fill="none" stroke-width="1.2" x="158" y="174" rx="8" width="84" height="96"/>
        <circle stroke="rgba(255,255,255,.16)" fill="none" stroke-width="1.2" cx="200" cy="288" r="10"/></g>
  <rect width="400" height="500" fill="url(#vig)"/>
</svg>
